name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release

    - name: Publish
      run: dotnet publish ./SamElhagPersonalSite/SamElhagPersonalSite.csproj --configuration Release --output ./publish

    - name: Stop IIS Site
      run: |
        Import-Module WebAdministration
        Stop-WebSite -Name "SamElhagDev"
      shell: powershell

    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        Stop-WebAppPool -Name "SamElhag.Dev"
        $timeout = 120
        $elapsed = 0
        while ((Get-WebAppPoolState -Name "SamElhag.Dev").Value -ne "Stopped") {
          if ($elapsed -ge $timeout) { throw "App pool did not stop within $timeout seconds" }
          Start-Sleep -Seconds 1
          $elapsed++
        }
        Write-Host "App pool stopped after $elapsed second(s)"
      shell: powershell

    - name: Deploy to IIS
      run: |
        Copy-Item -Path "./publish/*" -Destination "C:\inetpub\sites\SamElhagDev" -Recurse -Force
      shell: powershell

    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "SamElhag.Dev"
      shell: powershell

    - name: Start IIS Site
      run: |
        Import-Module WebAdministration
        Start-WebSite -Name "SamElhagDev"
      shell: powershell
